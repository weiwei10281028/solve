<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>解題方法庫</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/app.css?v=20260713i"><link rel="stylesheet" href="css/tool.css?v=20260713a"></head>
<body class="app-page"><header class="site-header"><div class="brand"><span class="brand-mark" aria-hidden="true"></span><div class="brand-text"><span class="brand-name">解題方法庫</span><span class="brand-sub">適用條件，不是固定劇本</span></div></div><nav class="header-nav"><a class="nav-btn" href="knowledge-studio.html">知識庫</a><a class="nav-btn" href="problem-analyzer.html">分析器</a></nav></header>
<main class="page-main tool-main"><div class="tool-grid"><section class="tool-panel"><h1 class="tool-title">方法卡</h1><p class="tool-desc">同一題可選多張方法卡；先填「何時不適用」，避免把相似題解法硬套進新題。</p>
<label class="tool-label" for="methodId">方法 ID</label><input class="tool-input" id="methodId" placeholder="例：reaction-stoichiometry"><label class="tool-label" for="methodLabel">方法名稱</label><input class="tool-input" id="methodLabel" placeholder="例：限量試劑法"><label class="tool-label" for="applicable">適用條件</label><textarea class="tool-textarea" id="applicable" style="min-height:90px" placeholder="例：反應式已知、至少兩種反應物有定量資料"></textarea><label class="tool-label" for="notApplicable">禁用／不適用條件</label><textarea class="tool-textarea" id="notApplicable" style="min-height:90px" placeholder="例：只給單一反應物且不涉及剩餘量"></textarea><label class="tool-label" for="required">必要檢查</label><textarea class="tool-textarea" id="required" style="min-height:90px" placeholder="例：方程式配平、n/係數比較、單位一致"></textarea><label class="tool-label" for="steps">候選步驟</label><textarea class="tool-textarea" id="steps" style="min-height:100px" placeholder="例：寫反應式、換算莫耳數、比較限量試劑"></textarea><label class="tool-label" for="methodMistakes">常見錯誤</label><textarea class="tool-textarea" id="methodMistakes" style="min-height:80px"></textarea><label class="tool-label" for="exampleIds">代表詳解 ID</label><input class="tool-input" id="exampleIds" placeholder="例：113-dce-chem-01">
<div class="tool-actions"><button class="btn-primary" id="saveMethod" type="button">儲存方法卡</button><button class="btn-ghost" id="clearMethod" type="button">清空</button><button class="btn-ghost" id="importLegacy" type="button">載入舊 methods.json</button></div><p class="tool-status" id="methodStatus" aria-live="polite"></p></section>
<section class="tool-panel"><h2 class="tool-title">使用原則</h2><p class="tool-desc">分析器會先看適用條件，再看禁用條件。方法卡只提供檢查清單，不能直接提供答案。</p><div class="tool-list"><div class="tool-row"><div class="tool-row-main"><div class="tool-row-title">範例：限量試劑法</div><div class="tool-row-meta">適用：至少兩種反應物有定量資料。必查：配平、莫耳數、n/係數。</div></div></div><div class="tool-row"><div class="tool-row-main"><div class="tool-row-title">資料關聯</div><div class="tool-row-meta">代表詳解 ID 只作教師風格或方法參考，不作相似題答案來源。</div></div></div></div></section>
<section class="tool-panel tool-panel--wide"><h2 class="tool-title">已建立的方法</h2><p class="tool-desc" id="methodCount"></p><div class="tool-list" id="methodList"></div></section></div></main>
<script src="js/knowledge-store.js?v=20260713a"></script><script>
(function(){const $=id=>document.getElementById(id), status=$('methodStatus'); const fields=['methodId','methodLabel','applicable','notApplicable','required','steps','methodMistakes','exampleIds']; const get=()=>({id:$('methodId').value,label:$('methodLabel').value,applicable_when:$('applicable').value,not_applicable_when:$('notApplicable').value,required_checks:$('required').value,candidate_steps:$('steps').value,common_mistakes:$('methodMistakes').value,example_ids:$('exampleIds').value}); const put=m=>{$('methodId').value=m.id||'';$('methodLabel').value=m.label||'';$('applicable').value=(m.applicable_when||[]).join('、');$('notApplicable').value=(m.not_applicable_when||[]).join('、');$('required').value=(m.required_checks||[]).join('、');$('steps').value=(m.candidate_steps||[]).join('、');$('methodMistakes').value=(m.common_mistakes||[]).join('、');$('exampleIds').value=(m.example_ids||[]).join('、');}; const clear=()=>fields.forEach(id=>$(id).value=''); function render(){const all=KnowledgeStore.read().methods; $('methodCount').textContent=`共 ${all.length} 張方法卡。`;const root=$('methodList');root.replaceChildren();if(!all.length){root.innerHTML='<p class="tool-empty">尚未建立方法卡。</p>';return;}all.forEach(m=>{const row=document.createElement('div');row.className='tool-row';const main=document.createElement('div');main.className='tool-row-main';const title=document.createElement('div');title.className='tool-row-title';title.textContent=`${m.label} (${m.id})`;const meta=document.createElement('div');meta.className='tool-row-meta';meta.textContent=`適用：${m.applicable_when.join('、')}｜必查：${m.required_checks.join('、')}`;main.append(title,meta);const edit=document.createElement('button');edit.className='btn-ghost';edit.type='button';edit.textContent='編輯';edit.onclick=()=>{put(m);window.scrollTo({top:0,behavior:'smooth'});};row.append(main,edit);root.append(row);});}
$('saveMethod').onclick=()=>{const result=KnowledgeStore.validateMethod(get());if(!result.ok){status.textContent=result.errors.join('；');status.className='tool-status tool-status--bad';return;}const method=KnowledgeStore.addMethod(result.method);put(method);status.textContent=`已儲存 ${method.label}`;status.className='tool-status tool-status--ok';render();};$('clearMethod').onclick=clear;$('importLegacy').onclick=async()=>{try{const res=await fetch('database/methods.json');if(!res.ok)throw Error('找不到 methods.json');const old=await res.json();let count=0;Object.entries(old.methods||{}).forEach(([id,m])=>{if(KnowledgeStore.read().methods.some(x=>x.id===id))return;KnowledgeStore.addMethod({id,label:m.label,applicable_when:['需依題意確認'],not_applicable_when:['條件與方法前提不符'],required_checks:['先確認題意與單位'],candidate_steps:m.steps||[],common_mistakes:m.pitfalls||[]});count++;});status.textContent=`已轉入 ${count} 張舊方法卡，請補齊適用條件。`;status.className='tool-status tool-status--ok';render();}catch(err){status.textContent=`載入失敗：${err.message}`;status.className='tool-status tool-status--bad';}};render();})();
</script></body></html>

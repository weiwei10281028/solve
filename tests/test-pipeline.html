<!doctype html>
<html lang="zh-TW">
<meta charset="utf-8">
<title>現行詳解管線測試</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="../css/board.css?v=20260719-single-pipeline">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@18.0.6/lib/marked.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.7/dist/purify.min.js"></script>
<script src="../js/render.js?v=20260719-single-pipeline"></script>
<body>
  <div class="board" style="max-width:375px"><div class="board-scroll" id="fixture"></div></div>
  <script>
    const sample = String.raw`【選項分析】
@@CHOICE[甲]@@ 正確，$\ce{MnO4^-}$ 的係數與電子守恆相符。
@@CHOICE[J]@@ 錯誤，這段一般文字應自然換行，不應因為含有短公式 $n=CV$ 就整段鎖成單行。
@@CHOICE[⑥]@@ $\dfrac{0.016\times10.5\times5}{10.0}=0.084$
@@ANSWER@@甲、⑥`;
    const fixture = document.getElementById('fixture');
    fixture.innerHTML = renderMarkdownSolution(sample);
    doKaTeX(fixture);
    requestAnimationFrame(() => {
      const labels = [...fixture.querySelectorAll('.markdown-choice-label')].map(el => el.textContent.trim());
      const prose = fixture.querySelectorAll('.markdown-choice-body')[1];
      const ok = labels.join('|') === '（甲）|（J）|（⑥）'
        && !prose.classList.contains('plain-line-inner--xscroll')
        && !fixture.textContent.includes('↔');
      document.title = ok ? 'PASS' : 'FAIL';
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-TW">
<meta charset="utf-8">
<title>FAIL</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="../css/board.css?v=20260721-no-note">
<body>
  <pre id="log"></pre>
  <div class="board" style="max-width:375px;display:none"><div class="board-scroll" id="fixture"></div></div>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@18.0.6/lib/marked.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.7/dist/purify.min.js"></script>
  <script src="../js/solution-core.js?v=20260721-no-note"></script>
  <script src="../js/render.js?v=20260721-no-note"></script>
  <script>
    const logEl = document.getElementById('log');
    const failures = [];

    function fail(msg) {
      failures.push(msg);
      logEl.textContent += 'FAIL: ' + msg + '\n';
    }

    function pass(msg) {
      logEl.textContent += 'PASS: ' + msg + '\n';
    }

    async function loadJson(name) {
      const res = await fetch(`fixtures/${name}`);
      return res.json();
    }

    function assertNoBrokenChemDollars(text, label) {
      if (/H\$\d|\$\d[A-Za-z]/.test(text)) {
        fail(`${label} 仍含破碎化學式 $：${text.slice(0, 120)}`);
        return false;
      }
      pass(`${label} 無 H$3PO$4 類殘段`);
      return true;
    }

    function assertSciNotation(text, label) {
      if (!/\$5\.4\\times10\^\{-5\}/.test(text) && !/\$1\.8\\times10\^\{-5\}/.test(text)) {
        fail(`${label} 未轉換科學記號：${text.match(/10\^?-?\d+/g)?.join(', ') || 'none'}`);
        return false;
      }
      pass(`${label} 科學記號已包 KaTeX`);
      return true;
    }

    function assertNoSplitUnitIslands(text, label) {
      if (/\$\d+(?:\.\d+)?(?:\\times10\^\{-?\d+\})?\$\$\\mathrm\{/.test(text)) {
        fail(`${label} 仍有數字／單位雙島：${text.match(/\$[^$]{0,40}\$\$\\mathrm\{[^}]+\}/)?.[0] || ''}`);
        return false;
      }
      pass(`${label} 無數字－單位雙島`);
      return true;
    }

    function assertNoDupNumbers(root, label) {
      const text = root.textContent || '';
      if (/\b0\.10\s+0\.10\b/.test(text) || /\b0\.002\s+0\.002\b/.test(text)) {
        fail(`${label} 數字重複顯示：${text.match(/\d+\.\d+\s+\d+\.\d+/)?.[0] || ''}`);
        return false;
      }
      pass(`${label} 無相鄰重複數字`);
      return true;
    }

    (async () => {
      try {
        const acid = await loadJson('acid-strength-raw.json');
        const titration = await loadJson('titration-raw.json');

        const acidPrepared = window.SolutionCore.prepare(JSON.stringify(acid));
        if (!acidPrepared.ok) throw new Error('acid compile failed');
        assertNoBrokenChemDollars(acidPrepared.text, 'acid compile');

        const acidRendered = window.normalizeScientificTokens(acidPrepared.text);
        assertNoBrokenChemDollars(acidRendered, 'acid render-token');
        if (!/\\ce\{H3O\^\+/.test(acidRendered) && !/\$\\ce\{H3O/.test(acidRendered)) {
          fail('acid render 未包 H3O+ 化學式');
        } else {
          pass('acid render 含 H3O+ mhchem');
        }

        const titrationPrepared = window.SolutionCore.prepare(JSON.stringify(titration));
        if (!titrationPrepared.ok) throw new Error('titration compile failed');
        assertNoBrokenChemDollars(titrationPrepared.text, 'titration compile');

        const titrationRendered = window.normalizeScientificTokens(titrationPrepared.text);
        assertSciNotation(titrationRendered, 'titration paragraph Ka');
        assertNoSplitUnitIslands(titrationRendered, 'titration render');
        if (/\\htmlData/.test(titrationPrepared.text)) {
          fail('titration compile 仍殘留 htmlData');
        } else {
          pass('titration compile 已剝除 htmlData');
        }
        if (!/\\dfrac/.test(titrationPrepared.text)) {
          fail('titration compile 缺少直式分式');
        } else {
          pass('titration compile 含 dfrac');
        }

        const qtyOne = window.normalizeScientificTokens('體積為 20.0 mL，濃度 0.10 M。');
        if (!/\$20\.0\\,\\mathrm\{mL\}\$/.test(qtyOne) || !/\$0\.10\\,\\mathrm\{M\}\$/.test(qtyOne)) {
          fail('數字＋單位未一體包 $：' + qtyOne);
        } else if (/\$20\.0\$\$\\mathrm|\$0\.10\$\$\\mathrm/.test(qtyOne)) {
          fail('數字與單位仍拆雙島：' + qtyOne);
        } else {
          pass('數字＋單位單一 math 島');
        }
        const proseNum = window.normalizeScientificTokens('加入 5.0 毫升後。');
        if (/\$5\.0\$/.test(proseNum)) {
          fail('說明句裸數字不應包 $：' + proseNum);
        } else {
          pass('說明句裸數字不包 $');
        }

        const cmpLine = window.normalizeScientificTokens('$CH3COOH > H2S$');
        if (!/\\ce\{CH(?:_3|3)COOH\}/.test(cmpLine) || !/\\ce\{H(?:_2|2)S\}/.test(cmpLine)) {
          fail('comparison 未在 $ 內轉 mhchem：' + cmpLine);
        } else {
          pass('comparison $ 內 mhchem 下標');
        }

        const ionSamples = [
          ['HSO3^- 與 IO3^-', /\\ce\{HSO3\^-\}/, /\\ce\{IO3\^-\}/],
          ['HSO3- 總體積', /\\ce\{HSO3-\}/],
          ['由表，HSO₃⁻ 與 IO₃⁻ 濃度', /\\ce\{HSO3\^-\}/, /\\ce\{IO3\^-\}/],
          ['[HSO3^-]=0.002', /\\ce\{HSO3\^-\}/]
        ];
        let ionOk = true;
        for (const [sample, ...patterns] of ionSamples) {
          const out = window.normalizeScientificTokens(sample);
          if (patterns.some((re) => !re.test(out))) {
            fail('離子式未進 mhchem：' + sample + ' → ' + out);
            ionOk = false;
            break;
          }
        }
        if (ionOk) pass('裸離子式（ASCII／Unicode）進 mhchem');

        const fixture = document.getElementById('fixture');
        fixture.innerHTML = window.renderMarkdownSolution(titrationRendered);
        window.doKaTeX(fixture);
        await new Promise((r) => setTimeout(r, 800));
        assertNoDupNumbers(fixture, 'titration DOM');

        document.title = failures.length ? 'FAIL' : 'PASS';
        if (failures.length) logEl.textContent += '\n' + failures.length + ' failure(s)';
      } catch (err) {
        fail(String(err && err.message ? err.message : err));
        document.title = 'FAIL';
      }
    })();
  </script>
</body>
</html>

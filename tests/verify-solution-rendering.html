  <script>
    const sample = String.raw`【已知條件與反應平衡】
本實驗為氧化還原滴定，$\ce{MnO4^-}$ 將 $\ce{Fe^2+}$ 氧化，敘述文字可以依螢幕寬度自然換行。
$\ce{MnO4^- + 5Fe^2+ + 8H+ -> Mn^2+ + 5Fe^3+ + 4H2O}$
【計算過程】
$n_{\ce{Fe^2+}}=5\times0.016\times0.0105=8.4\times10^{-4}\,\mathrm{mol}$
【選項分析】
@@CHOICE[甲]@@ 正確，電子轉移數與係數比一致。
@@CHOICE[J]@@ 錯誤，這是一段較長的中文理由，應自然分行並維持標點，不可被鎖在同一行。
@@CHOICE[⑥]@@ 正確，$\ce{MnO4^-}$ 的上下標與電荷應由 KaTeX 正確顯示。
@@ANSWER@@甲、⑥`;

    fixture.innerHTML = renderMarkdownSolution(sample);
    doKaTeX(fixture);

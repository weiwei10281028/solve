<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>指定答案驗證器</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/app.css?v=20260713i"><link rel="stylesheet" href="css/tool.css?v=20260713a"></head>
<body class="app-page"><header class="site-header"><div class="brand"><span class="brand-mark" aria-hidden="true"></span><div class="brand-text"><span class="brand-name">指定答案驗證器</span><span class="brand-sub">逐項證明，不能硬湊</span></div></div><nav class="header-nav"><a class="nav-btn" href="problem-analyzer.html">分析器</a><a class="nav-btn" href="evaluation-lab.html">測試台</a></nav></header>
<main class="page-main tool-main"><div class="tool-grid"><section class="tool-panel"><h1 class="tool-title">教師答案</h1><p class="tool-desc">先輸入教師答案，再對每一選項填寫成立／不成立理由。缺理由或集合不一致會阻止「通過」。</p><label class="tool-label" for="auditTitle">題目識別（選填）</label><input class="tool-input" id="auditTitle" placeholder="例：113分科第 8 題"><label class="tool-label" for="expectedAnswer">教師答案</label><input class="tool-input" id="expectedAnswer" placeholder="例：ACE"><div class="tool-actions"><button class="btn-ghost" id="addOption" type="button">新增選項</button><button class="btn-primary" id="runAudit" type="button">檢查一致性</button><button class="btn-ghost" id="saveAudit" type="button" disabled>儲存紀錄</button></div><p class="tool-status" id="auditStatus"></p></section><section class="tool-panel"><h2 class="tool-title">規則</h2><p class="tool-desc">這是機械一致性檢查：它不宣稱理由本身一定正確，教師仍可在衝突時重新看題幹、OCR、圖表或答案。</p><div class="tool-row"><div class="tool-row-main"><div class="tool-row-title">不允許</div><div class="tool-row-meta">「依參考答案選」或沒有反證理由的錯誤選項。</div></div></div></section><section class="tool-panel tool-panel--wide"><h2 class="tool-title">逐項證明</h2><div class="tool-list" id="optionRows"></div></section></div></main>
<script src="js/knowledge-store.js?v=20260713a"></script><script src="js/knowledge-tools.js?v=20260713a"></script><script>
(function(){const root=document.getElementById('optionRows'),status=document.getElementById('auditStatus'),save=document.getElementById('saveAudit');let last=null;function add(label=''){const row=document.createElement('div');row.className='tool-row';const main=document.createElement('div');main.className='tool-row-main';const line=document.createElement('div');line.className='tool-actions';line.style.marginTop='0';const name=document.createElement('input');name.className='tool-input';name.style.maxWidth='80px';name.placeholder='A';name.value=label;const correct=document.createElement('label');correct.className='tool-check';const box=document.createElement('input');box.type='checkbox';const text=document.createElement('span');text.textContent='判定正確';correct.append(box,text);line.append(name,correct);const reason=document.createElement('textarea');reason.className='tool-textarea';reason.style.minHeight='68px';reason.placeholder='題目依據、計算或反證理由';main.append(line,reason);const remove=document.createElement('button');remove.className='btn-ghost';remove.type='button';remove.textContent='移除';remove.onclick=()=>row.remove();row.append(main,remove);root.append(row);}['A','B','C','D','E'].forEach(add);document.getElementById('addOption').onclick=()=>add('');document.getElementById('runAudit').onclick=()=>{const rows=[...root.children].map(row=>({label:row.querySelector('input[type=text],input:not([type])')?.value||row.querySelector('.tool-input').value,correct:row.querySelector('input[type=checkbox]').checked,reason:row.querySelector('textarea').value}));last=KnowledgeTools.auditAnswer(document.getElementById('expectedAnswer').value,rows);if(last.ok){status.textContent=`通過：教師答案與逐項判定一致（${last.selected.join('')}）。`;status.className='tool-status tool-status--ok';save.disabled=false;}else{status.textContent=[last.conflict,last.missingReason.length?`缺少理由：${last.missingReason.join('、')}`:''].filter(Boolean).join('；');status.className='tool-status tool-status--bad';save.disabled=true;}};save.onclick=()=>{if(!last?.ok)return;KnowledgeStore.saveAudit({title:document.getElementById('auditTitle').value,expected:document.getElementById('expectedAnswer').value,selected:last.selected,status:'passed'});status.textContent='已儲存驗證紀錄。';};})();
</script></body></html>

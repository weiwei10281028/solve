:root{--black:#171717;--grey:#707070;--line:#dedede;--paper:#fff;--canvas:#dedede}*{box-sizing:border-box}html{color-scheme:light}body{margin:0;background:var(--canvas);color:var(--black);font-family:"Noto Sans TC",sans-serif}button,input,textarea{font:inherit}button{cursor:pointer}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid #000;outline-offset:3px}.canvas{width:min(1130px,calc(100% - 54px));margin:92px auto 58px;background:var(--paper);border-top:7px solid #777;box-shadow:0 23px 45px rgba(0,0,0,.16);position:relative}.canvas:before,.canvas:after{content:"";position:absolute;top:-7px;width:36%;height:7px;background:#fff}.canvas:before{left:36%}.canvas:after{right:0;background:#777}.inner{margin:34px 72px 60px;border:1px solid var(--line);position:relative}.inner:before,.inner:after{content:"";position:absolute;width:9px;height:9px;border-color:#171717;border-style:solid;z-index:2}.inner:before{left:-1px;top:-1px;border-width:1px 0 0 1px}.inner:after{right:-1px;bottom:-1px;border-width:0 1px 1px 0}.top{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--line)}.brand{font-weight:700;font-size:14px}.brand:before{content:"✦";margin-right:8px}.nav{display:flex;gap:19px;align-items:center;color:#666;font-size:11px}.nav button{border:0;background:transparent;color:inherit;font-size:11px}.nav .login{color:var(--black)}.nav .cta{background:var(--black);color:#fff;padding:10px 13px}.stripe{height:28px;border-bottom:1px solid var(--line);background:repeating-linear-gradient(135deg,#fff 0,#fff 3px,#ededed 3px,#ededed 4px)}.hero{text-align:center;padding:48px 20px 30px}.label{display:inline-block;border:1px solid #aaa;padding:4px 10px;font:10px "DM Mono",monospace;color:#555}.hero h1{margin:15px 0 0;font-size:clamp(35px,5.3vw,64px);line-height:1.12;letter-spacing:-.075em;font-weight:600}.hero p{display:none}.app{margin:0 40px 44px;border:1px solid var(--black);text-align:left}.app-head{padding:12px 15px;border-bottom:1px solid var(--black);display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700}.app-head span{font:10px "DM Mono",monospace;color:#666}.form{padding:22px;display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:24px}.field-label{display:block;font-size:12px;font-weight:700;margin-bottom:8px}.field-label em{font-style:normal;color:#777;font-weight:400}.question{width:100%;height:165px;resize:vertical;border:1px solid #bbb;padding:13px;line-height:1.7;color:#111}.question::placeholder,.field::placeholder{color:#969696}.tools{display:flex;gap:8px;margin-top:9px}.outline{border:1px solid #aaa;background:#fff;padding:8px 10px;font-size:12px}.outline:hover{border-color:#000}.preview{display:none;margin-top:10px;border:1px solid #aaa;padding:8px 10px;font-size:12px;align-items:center;gap:8px}.preview.show{display:flex}.preview b{font:10px "DM Mono",monospace}.preview button{margin-left:auto;border:0;background:transparent;text-decoration:underline;font-size:11px}.side{display:grid;align-content:start;gap:15px}.field{width:100%;border:1px solid #bbb;padding:10px;font-size:13px}.note{min-height:94px;resize:vertical}.chapter{border:1px solid #aaa;background:#fff;padding:10px;text-align:left;font-size:12px;display:flex;justify-content:space-between}.chapter strong{font-weight:600}.formats{padding:0 22px 20px;display:flex;gap:7px;flex-wrap:wrap}.formats span{font-size:11px;color:#666;align-self:center;margin-right:3px}.format{border:1px solid #aaa;background:#fff;padding:7px 9px;font-size:11px}.format.active{background:#111;color:#fff;border-color:#111}.actions{border-top:1px solid #bbb;padding:13px 22px;display:flex;align-items:center;gap:10px}.actions small{color:#777;font-size:10px;line-height:1.5}.solve{margin-left:auto;background:#111;color:#fff;border:0;padding:11px 18px;font-size:12px;font-weight:700}.result{display:none;border-top:1px solid #111;padding:22px;margin:0 40px 44px}.result.show{display:block}.result h2{font-size:19px;margin:0 0 12px}.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.result-grid div{border:1px solid #bbb;padding:10px;font-size:12px;line-height:1.6}.result-grid b{display:block;font:10px "DM Mono",monospace;margin-bottom:4px}.mobile-bar{display:none}dialog{padding:0;border:1px solid #111;width:min(650px,calc(100% - 24px));color:#111}dialog::backdrop{background:rgba(0,0,0,.5)}.d-head{padding:15px;border-bottom:1px solid #111;display:flex;justify-content:space-between;font-size:15px;font-weight:700}.d-head button{border:0;background:none;font-size:19px}.d-body{padding:16px}.d-body p{font-size:12px;color:#666;margin:0 0 12px}.chapter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.chapter-grid button{border:1px solid #bbb;background:#fff;padding:10px 8px;text-align:left;font-size:12px}.chapter-grid button[aria-pressed=true]{background:#111;color:#fff;border-color:#111}.d-foot{border-top:1px solid #ddd;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;font-size:12px}.d-foot button{border:1px solid #111;background:#111;color:#fff;padding:8px 12px}.toast{position:fixed;left:50%;bottom:78px;transform:translate(-50%,12px);opacity:0;background:#111;color:#fff;padding:9px 12px;font-size:12px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:700px){body{background:#fff}.canvas{width:100%;margin:0;box-shadow:none;border-top:4px solid #111}.canvas:before,.canvas:after{display:none}.inner{margin:0;border:0}.top{padding:0 16px;height:55px;border-bottom:1px solid #111}.nav{gap:8px}.nav button:not(.cta),.nav .login{display:none}.nav .cta{padding:8px 10px}.stripe{height:16px}.hero{padding:30px 18px 24px;text-align:left}.label{font-size:9px}.hero h1{font-size:clamp(34px,11vw,50px);line-height:1.08;margin-top:13px}.app{margin:0;border-left:0;border-right:0}.app-head{padding:11px 16px}.form{padding:16px;display:block}.side{margin-top:16px;gap:14px}.question{height:142px}.tools{overflow:auto;padding-bottom:2px}.formats{padding:0 16px 16px;overflow:auto;flex-wrap:nowrap;white-space:nowrap}.actions{padding:12px 16px 82px}.actions .solve{display:none}.actions small{max-width:265px}.result{margin:0;padding:20px 16px 92px;border-top:1px solid #111}.result-grid{grid-template-columns:1fr}.mobile-bar{position:fixed;display:flex;gap:8px;align-items:center;left:0;right:0;bottom:0;padding:9px 12px calc(9px + env(safe-area-inset-bottom));background:rgba(255,255,255,.96);border-top:1px solid #111;z-index:4}.mobile-bar small{font-size:10px;color:#666;line-height:1.35;max-width:90px}.mobile-bar .solve{display:block;flex:1;margin:0;min-height:42px}.chapter-grid{grid-template-columns:1fr 1fr}}@media(prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style></head><body><div class="canvas"><div class="inner"><header class="top"><div class="brand">化學解題</div><nav class="nav"><button>功能</button><button>方法</button><button class="login">登入</button><button class="cta" id="settings">設定</button></nav></header><div class="stripe"></div><main><section class="hero"><span class="label">CHEMISTRY QUESTION WORKSPACE</span><h1>把題目交給我，<br>一步一步看懂它。</h1></section><section class="app"><div class="app-head">建立題目 <span>DEMO · 不會傳送資料</span></div><div class="form"><div><label class="field-label" for="question">題目 <em>必填</em></label><textarea class="question" id="question" placeholder="上傳圖片，或在此輸入／貼上題目"></textarea><div class="tools"><input id="file" type="file" accept="image/*" hidden><button class="outline" id="upload" type="button">＋ 上傳題目圖片</button><button class="outline" id="formula" type="button">插入公式</button></div><div class="preview" id="preview"><b>IMG</b><span id="fileName">題目圖片</span><button id="remove" type="button">移除</button></div></div><div class="side"><div><label class="field-label" for="answer">參考答案 <em>建議填寫</em></label><input class="field" id="answer" placeholder="例：(E)、3.A、2.42 mol"></div><div><label class="field-label" for="note">補充說明 <em>選填</em></label><textarea class="field note" id="note" placeholder="例如：第 5 題、圖中數字較模糊。"></textarea></div><button class="chapter" id="chaptersOpen" type="button"><strong id="chapterText">選擇章節類型</strong><span>＋</span></button></div></div><div class="formats"><span>作答格式</span><button class="format active" type="button">一般詳解</button><button class="format" type="button">計算題四步推導</button><button class="format" type="button">選擇題逐項分析</button></div><div class="actions"><small>題目、答案與補充說明均為本次解題的必要資訊。</small><button class="outline" id="clear" type="button">清除</button><button class="solve" id="solve" type="button">開始解題 →</button></div></section><section class="result" id="result"><h2>解題結果預覽</h2><div class="result-grid"><div><b>01 / 題意</b>整理已知與所求。</div><div><b>02 / 推導</b>依公式或反應式計算。</div><div><b>03 / 結論</b>檢查單位與答案格式。</div></div></section></main></div></div><div class="mobile-bar"><small id="mobileState">等待題目</small><button class="solve" id="mobileSolve" type="button">開始解題 →</button></div><dialog id="chapters"><div class="d-head">選擇章節類型 <button data-close="chapters" aria-label="關閉">×</button></div><div class="d-body"><p>可選 1～3 個章節，不選時依題意自動判斷。</p><div class="chapter-grid" id="grid"><button aria-pressed="false">原子結構與週期表</button><button aria-pressed="false">化學鍵與分子結構</button><button aria-pressed="false">化學計量</button><button aria-pressed="false">氣體</button><button aria-pressed="false">溶液與濃度</button><button aria-pressed="false">酸鹼</button><button aria-pressed="false">氧化還原與電化學</button><button aria-pressed="false">化學平衡</button><button aria-pressed="false">反應速率</button><button aria-pressed="false">有機化學</button><button aria-pressed="false">實驗與數據判讀</button></div></div><div class="d-foot"><span id="count">尚未選擇</span><button id="apply" type="button">套用選擇</button></div></dialog><dialog id="settingsDialog"><div class="d-head">展示設定 <button data-close="settingsDialog" aria-label="關閉">×</button></div><div class="d-body"><p>此頁只展示版面與互動，不儲存資料或連線至 AI。</p></div></dialog><div class="toast" id="toast" role="status"></div><script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];const q=$('#question'),toast=$('#toast');let t;const say=m=>{toast.textContent=m;toast.classList.add('show');clearTimeout(t);t=setTimeout(()=>toast.classList.remove('show'),2200)};const status=()=>$('#mobileState').textContent=(q.value.trim()||$('#file').files.length)?'題目已準備好':'等待題目';q.oninput=status;$('#upload').onclick=()=>$('#file').click();$('#file').onchange=e=>{if(!e.target.files[0])return;$('#fileName').textContent=e.target.files[0].name;$('#preview').classList.add('show');status();say('已加入圖片')};$('#remove').onclick=()=>{$('#file').value='';$('#preview').classList.remove('show');status()};$('#formula').onclick=()=>{q.setRangeText('  n = m / M  ',q.selectionStart,q.selectionEnd,'end');q.focus();status()};$('#clear').onclick=()=>{q.value='';$('#answer').value='';$('#note').value='';$('#file').value='';$('#preview').classList.remove('show');$('#result').classList.remove('show');status()};$$('.format').forEach(b=>b.onclick=()=>$$('.format').forEach(x=>x.classList.toggle('active',x===b)));$('#chaptersOpen').onclick=()=>$('#chapters').showModal();$('#settings').onclick=()=>$('#settingsDialog').showModal();$$('[data-close]').forEach(b=>b.onclick=()=>$('#'+b.dataset.close).close());const update=()=>{let n=$$('#grid button[aria-pressed="true"]').length;$('#count').textContent=n?`已選擇 ${n} 個章節`:'尚未選擇';$('#chapterText').textContent=n?`已選擇 ${n} 個章節`:'選擇章節類型'};$$('#grid button').forEach(b=>b.onclick=()=>{let n=$$('#grid button[aria-pressed="true"]').length;if(b.getAttribute('aria-pressed')==='false'&&n===3)return say('最多選擇 3 個章節');b.setAttribute('aria-pressed',b.getAttribute('aria-pressed')!=='true');update()});$('#apply').onclick=()=>{$('#chapters').close();say('已套用章節')};const solve=()=>{if(!q.value.trim()&&!$('#file').files.length){q.focus();return say('先輸入題目或上傳圖片')}$('#result').classList.add('show');$('#result').scrollIntoView({behavior:'smooth'});say('已建立結果預覽')};$('#solve').onclick=solve;$('#mobileSolve').onclick=solve;
</script></body></html>

<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>教師測試與回饋台</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/app.css?v=20260713i"><link rel="stylesheet" href="css/tool.css?v=20260713a"></head>
<body class="app-page"><header class="site-header"><div class="brand"><span class="brand-mark" aria-hidden="true"></span><div class="brand-text"><span class="brand-name">教師測試與回饋台</span><span class="brand-sub">回歸測試集</span></div></div><nav class="header-nav"><a class="nav-btn" href="answer-audit.html">答案驗證</a><a class="nav-btn" href="knowledge-studio.html">知識庫</a></nav></header>
<main class="page-main tool-main"><div class="tool-grid"><section class="tool-panel"><h1 class="tool-title">測試案例</h1><p class="tool-desc">先記錄預期，之後填入實際結果。這一頁只做本機比對與統計，不批次呼叫 API。</p><label class="tool-label" for="testTitle">案例名稱</label><input class="tool-input" id="testTitle" placeholder="例：113分科第8題－草酸鈣溶解度"><label class="tool-label" for="testCategory">類型</label><select class="tool-select" id="testCategory"><option>標準題</option><option>易混淆題</option><option>指定答案題</option><option>表格題</option><option>方程式題</option></select><label class="tool-label" for="expectedMethod">預期方法 ID</label><input class="tool-input" id="expectedMethod" placeholder="例：equilibrium-table"><label class="tool-label" for="expectedAnswerTest">預期答案</label><input class="tool-input" id="expectedAnswerTest" placeholder="例：ACE"><label class="tool-label" for="actualMethod">實際方法 ID</label><input class="tool-input" id="actualMethod"><label class="tool-label" for="actualAnswer">實際答案</label><input class="tool-input" id="actualAnswer"><label class="tool-label" for="feedback">教師回饋</label><textarea class="tool-textarea" id="feedback" style="min-height:90px" placeholder="例：答案正確但講解不像教師、表格錯誤"></textarea><div class="tool-actions"><button class="btn-primary" id="checkTest" type="button">本機檢查並儲存</button><button class="btn-ghost" id="clearTest" type="button">清空</button></div><p class="tool-status" id="testStatus"></p></section><section class="tool-panel"><h2 class="tool-title">統計</h2><p class="tool-desc">用來決定下一次要修規則、方法卡或排版，而不是重跑所有 AI 結果。</p><div class="tool-list" id="stats"></div></section><section class="tool-panel tool-panel--wide"><h2 class="tool-title">已保存案例</h2><div class="tool-list" id="testList"></div></section></div></main>
<script src="js/knowledge-store.js?v=20260713a"></script><script src="js/knowledge-tools.js?v=20260713a"></script><script>
(function(){const $=id=>document.getElementById(id),status=$('testStatus');const fields=['testTitle','expectedMethod','expectedAnswerTest','actualMethod','actualAnswer','feedback'];function clear(){fields.forEach(id=>$(id).value='');$('testCategory').selectedIndex=0;status.textContent='';}function render(){const tests=KnowledgeStore.read().tests,root=$('testList'),stats=$('stats');root.replaceChildren();stats.replaceChildren();const pass=tests.filter(t=>t.status==='passed').length,fail=tests.length-pass;[['總案例',tests.length],['通過',pass],['需修正',fail]].forEach(([a,b])=>{const row=document.createElement('div');row.className='tool-row';row.textContent=`${a}：${b}`;stats.append(row);});if(!tests.length){root.innerHTML='<p class="tool-empty">尚未保存測試案例。</p>';return;}tests.slice().reverse().forEach(t=>{const row=document.createElement('div');row.className='tool-row';const main=document.createElement('div');main.className='tool-row-main';const title=document.createElement('div');title.className='tool-row-title';title.textContent=t.title;const meta=document.createElement('div');meta.className='tool-row-meta';meta.textContent=`${t.category}｜${t.status==='passed'?'通過':'需修正'}｜${t.feedback||'無回饋'}`;main.append(title,meta);const tag=document.createElement('span');tag.className='tool-badge';tag.textContent=t.status==='passed'?'通過':'需修正';row.append(main,tag);root.append(row);});}$('checkTest').onclick=()=>{const expectedAnswer=$('expectedAnswerTest').value,actualAnswer=$('actualAnswer').value;const answerOk=KnowledgeTools.answerSet(expectedAnswer).join('')===KnowledgeTools.answerSet(actualAnswer).join('');const methodOk=$('expectedMethod').value.trim()===$('actualMethod').value.trim();const result={title:$('testTitle').value||'未命名案例',category:$('testCategory').value,expected_method:$('expectedMethod').value,expected_answer:expectedAnswer,actual_method:$('actualMethod').value,actual_answer:actualAnswer,feedback:$('feedback').value,status:answerOk&&methodOk?'passed':'needs_review'};KnowledgeStore.saveTest(result);status.textContent=result.status==='passed'?'通過：答案與方法皆一致。':`需修正：${!answerOk?'答案不一致 ':''}${!methodOk?'方法不一致':''}`;status.className=`tool-status ${result.status==='passed'?'tool-status--ok':'tool-status--bad'}`;render();};$('clearTest').onclick=clear;render();})();
</script></body></html>

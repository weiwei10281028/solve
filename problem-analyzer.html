<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>題目分析器</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/app.css?v=20260713i"><link rel="stylesheet" href="css/tool.css?v=20260713a"></head>
<body class="app-page"><header class="site-header"><div class="brand"><span class="brand-mark" aria-hidden="true"></span><div class="brand-text"><span class="brand-name">題目分析器</span><span class="brand-sub">先選方法，再寫詳解</span></div></div><nav class="header-nav"><a class="nav-btn" href="method-library.html">方法庫</a><a class="nav-btn" href="answer-audit.html">答案驗證</a></nav></header>
<main class="page-main tool-main"><div class="tool-grid"><section class="tool-panel"><h1 class="tool-title">新題分析</h1><p class="tool-desc">只以本機條件篩選方法與知識條目，不會將舊詳解當作新題答案，也不使用 API Token。</p><label class="tool-label" for="analysisQuestion">題目文字</label><textarea class="tool-textarea" id="analysisQuestion" placeholder="貼上題目或 OCR 後文字…"></textarea><div class="tool-actions"><button class="btn-primary" id="analyzeBtn" type="button">本機分析</button><button class="btn-ghost" id="copyAnalysis" type="button" disabled>複製分析摘要</button></div><p class="tool-status" id="analysisStatus"></p></section><section class="tool-panel"><h2 class="tool-title">流程</h2><p class="tool-desc">分析結果只作為下一步解題前的確認清單。</p><ol style="padding-left:22px;color:var(--ink-muted);line-height:1.9"><li>抽取數字、單位與明顯概念線索。</li><li>篩選有適用條件的方法卡。</li><li>列出必須驗證的項目。</li><li>教師確認後才送往解題或答案驗證。</li></ol></section><section class="tool-panel tool-panel--wide"><h2 class="tool-title">分析結果</h2><div id="analysisResult" class="tool-empty">尚未分析。</div></section></div></main>
<script src="js/knowledge-store.js?v=20260713a"></script><script src="js/knowledge-tools.js?v=20260713a"></script><script>
(function(){const q=document.getElementById('analysisQuestion'),out=document.getElementById('analysisResult'),status=document.getElementById('analysisStatus'),copy=document.getElementById('copyAnalysis');let summary='';const item=(title,content)=>{const r=document.createElement('div');r.className='tool-row';const main=document.createElement('div');main.className='tool-row-main';const t=document.createElement('div');t.className='tool-row-title';t.textContent=title;const d=document.createElement('div');d.className='tool-row-meta';d.textContent=content||'—';main.append(t,d);r.append(main);return r;};document.getElementById('analyzeBtn').onclick=()=>{if(!q.value.trim()){status.textContent='請先輸入題目。';status.className='tool-status tool-status--bad';return;}const data=KnowledgeStore.read(),result=KnowledgeTools.analyzeQuestion(q.value,data.methods,data.items);out.replaceChildren();out.className='tool-list';out.append(item('考點',result.concepts.join('、')),item('題型',result.question_type||'尚無明確分類'),item('已知條件',result.known_conditions.join('、')),item('必須驗證',result.required.join('、')||'請人工補列'));if(result.candidates.length){result.candidates.forEach(c=>out.append(item(`候選方法：${c.method.label}`,`命中線索：${c.hits.join('、')||'由本機概念判斷'}｜必要檢查：${c.method.required_checks.join('、')}`)));}else out.append(item('候選方法','目前無符合方法卡；請到方法庫建立或人工指定。'));if(result.excluded.length)out.append(item('排除方法',result.excluded.map(x=>x.label).join('、')));if(result.related.length)out.append(item('相關教師條目（僅參考）',result.related.map(x=>x.item.id).join('、')));summary=[`考點：${result.concepts.join('、')}`,`題型：${result.question_type||'未定'}`,`候選方法：${result.candidates.map(x=>x.method.id).join('、')}`,`必查：${result.required.join('、')}`].join('\n');status.textContent='分析完成；請確認候選方法後再解題。';status.className='tool-status tool-status--ok';copy.disabled=false;};copy.onclick=async()=>{if(summary){await navigator.clipboard.writeText(summary);status.textContent='已複製分析摘要。';}};})();
</script></body></html>

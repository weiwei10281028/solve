<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>詳解排版工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="css/app.css?v=20260713i">
  <link rel="stylesheet" href="css/tool.css?v=20260713a">
</head>
<body class="app-page">
  <header class="site-header">
    <div class="brand"><span class="brand-mark" aria-hidden="true"></span><div class="brand-text"><span class="brand-name">詳解排版工具</span><span class="brand-sub">輸出前品質閘門</span></div></div>
    <nav class="header-nav"><a class="nav-btn" href="index.html">解題</a><a class="nav-btn" href="knowledge-studio.html">知識庫</a></nav>
  </header>
  <main class="page-main tool-main">
    <section class="tool-panel">
      <h1 class="tool-title">先修復，再輸出</h1>
      <p class="tool-desc">會統一公式分隔符號、修復可確定的括號錯誤，並用 KaTeX 逐段驗證；未包住的 LaTeX 會阻止匯出。</p>
      <label class="tool-label" for="rawSolution">AI 原始詳解</label>
      <textarea id="rawSolution" class="tool-textarea" placeholder="貼上 AI 產生的詳解…"></textarea>
      <div class="tool-actions"><button class="btn-primary" type="button" id="formatBtn">整理與檢查</button><button class="btn-ghost" type="button" id="copyBtn" disabled>複製已檢查版本</button><button class="btn-ghost" type="button" id="downloadBtn" disabled>下載 Markdown</button></div>
      <p class="tool-status" id="formatStatus" aria-live="polite">尚未檢查。</p>
    </section>
    <section class="tool-panel">
      <h2 class="tool-title">輸出預覽</h2>
      <p class="tool-desc">僅顯示已通過公式檢查的內容。</p>
      <div class="tool-preview" id="formatPreview">整理後的內容會顯示在這裡。</div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="js/latex-sanitize.js?v=20260713a"></script>
  <script src="js/solution-format.js?v=20260713a"></script>
  <script>
    (function () {
      const raw = document.getElementById('rawSolution');
      const preview = document.getElementById('formatPreview');
      const status = document.getElementById('formatStatus');
      const copy = document.getElementById('copyBtn');
      const download = document.getElementById('downloadBtn');
      let checked = '';
      function show(text) {
        preview.textContent = text || '整理後的內容會顯示在這裡。';
        if (text && window.renderMathInElement) {
          renderMathInElement(preview, { delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }], throwOnError: true, strict: 'ignore' });
        }
      }
      document.getElementById('formatBtn').addEventListener('click', () => {
        const result = SolutionFormat.format(raw.value);
        raw.value = result.text;
        show(result.text);
        const notes = [...result.report.errors, ...result.report.warnings];
        const message = result.report.ok
          ? `通過：已檢查 ${result.report.mathCount} 段公式${notes.length ? `；提醒：${notes.join('；')}` : ''}`
          : `未通過：${notes.join('；')}`;
        status.textContent = message;
        status.className = `tool-status ${result.report.ok ? 'tool-status--ok' : 'tool-status--bad'}`;
        checked = result.report.ok ? result.text : '';
        copy.disabled = !checked;
        download.disabled = !checked;
      });
      copy.addEventListener('click', async () => { if (checked) { await navigator.clipboard.writeText(checked); status.textContent = '已複製已檢查版本。'; } });
      download.addEventListener('click', () => { if (!checked) return; const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([checked], { type: 'text/markdown;charset=utf-8' })); a.download = 'formatted-solution.md'; a.click(); setTimeout(() => URL.revokeObjectURL(a.href), 0); });
    })();
  </script>
</body>
</html>

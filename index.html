<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF7F2">
  <title>化學解題工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="css/app.css?v=20250626t">
  <link rel="stylesheet" href="css/board.css?v=20250626x">
  <link rel="stylesheet" href="css/plain-reaction-table.css?v=20250626a">
  <link rel="stylesheet" href="css/plain-choice-options.css?v=20250625g">
  <link rel="stylesheet" href="css/math-note/math-note.css?v=20250626b">
</head>
<body class="app-page">

<header class="site-header">
  <div class="brand">
    <span class="brand-mark" aria-hidden="true"></span>
    <div class="brand-text">
      <span class="brand-name">化學解題工具</span>
      <span class="brand-sub">板書風格詳解</span>
    </div>
  </div>
  <nav class="header-nav">
    <a class="nav-btn" href="db-import.html">題庫匯入</a>
    <button class="nav-btn nav-btn--accent" type="button" onclick="openModal()">設定</button>
  </nav>
</header>

<main class="page-main">
  <section class="panel panel-input" aria-label="上傳題目">
    <div class="panel-head">
      <h1 class="panel-title">上傳題目</h1>
      <p class="panel-desc">拍照上傳，或直接輸入題目文字；皆可配對題庫</p>
    </div>

    <div class="upload-zone" id="zone">
      <input type="file" id="fileInput" accept="image/*" onchange="onFile(this.files[0])">
      <div class="upload-graphic" aria-hidden="true">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect x="4" y="8" width="32" height="26" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="14" cy="18" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 28l9-8 7 6 6-5 10 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="upload-title">選擇題目圖片</p>
      <p class="upload-hint">點擊、拖放或貼上</p>
    </div>

    <div class="preview-wrap" id="prevWrap">
      <button type="button" class="preview-btn" id="previewBtn" onclick="openLightbox()" title="點擊放大">
        <img class="preview-img" id="prevImg" src="" alt="題目預覽">
        <span class="preview-zoom-hint">點擊放大</span>
      </button>
      <p class="preview-name" id="prevName"></p>
    </div>

    <div class="field-group">
      <label class="field-label" for="textQuestionInput">直接輸入題目（可不傳圖）</label>
      <textarea class="question-input text-question-input" id="textQuestionInput" rows="4" placeholder="貼上題幹、選項、數據；圖片被裁切時請在此補齊缺漏"></textarea>
      <p class="field-hint">有圖片時以圖為主；僅填此欄也可開始解題並配對資料庫</p>
    </div>

    <div class="field-group">
      <label class="field-label" for="questionInput">補充關鍵字（選填）</label>
      <input type="text" class="question-input" id="questionInput" placeholder="例：第 11 題（指定題號時只解該題）" autocomplete="off">
    </div>

    <div class="field-group">
      <label class="field-label" for="answerInput">參考答案（選填）</label>
      <input type="text" class="question-input" id="answerInput" placeholder="例：(E)、2.42、0.33 mol…" autocomplete="off">
      <p class="field-hint">若已知正確選項或數值，填入後 AI 會對照檢核，準確率通常更高</p>
    </div>

    <div class="action-row">
      <button class="btn-primary" type="button" id="solveBtn" onclick="startSolve()" disabled>開始解題</button>
      <button class="btn-ghost" type="button" onclick="clearAll()">清除</button>
    </div>
  </section>

  <section class="panel panel-result result-card" id="resultCard" aria-label="解題結果">
    <div class="result-header">
      <div>
        <h2 class="panel-title panel-title--sm">詳解</h2>
        <p class="panel-desc panel-desc--hint">點擊數字可以觀看說明</p>
      </div>
      <span class="status-badge" id="badge">就緒</span>
    </div>

    <div class="board" id="board">
      <div class="board-scroll" id="mainSolution"></div>
    </div>

    <div class="loading-inline" id="loading">
      <div class="spinner" aria-hidden="true"></div>
      <span>撰寫詳解中…</span>
    </div>

    <div class="followup-panel" id="followupPanel">
      <div class="followup-area" id="followupArea" hidden>
        <p class="followup-section-label">追問紀錄</p>
        <div class="followup-list" id="followupThread"></div>
      </div>

      <div class="followup-wrap chat-input-wrap" id="chatInputWrap">
        <label class="field-label" for="chatInput">追問</label>
        <form class="followup-form" id="followupForm" onsubmit="return submitFollowUp(event)">
          <div class="followup-input-box">
            <div class="followup-row chat-input-row">
              <textarea class="chat-input" id="chatInput" rows="2" placeholder="針對步驟追問…（Enter 送出、Shift+Enter 換行）"></textarea>
              <button class="btn-send" type="submit" id="sendBtn">送出</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </section>
</main>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" role="dialog" aria-labelledby="modalTitle">
    <h2 class="modal-title" id="modalTitle">連線設定</h2>
    <p class="modal-desc">金鑰僅儲存在你的瀏覽器，不會上傳至其他伺服器。</p>

    <div class="tip-box">
      化學計算建議使用 <strong>Gemini 3.1 Flash Lite</strong>。
      <a id="keyLink" href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">取得 API 金鑰</a>
    </div>

    <label class="field-label" for="providerSel">服務</label>
    <select class="field-input" id="providerSel" onchange="onProviderChange()">
      <option value="gemini">Google Gemini</option>
    </select>

    <label class="field-label" for="keyInput">API 金鑰</label>
    <input type="password" class="field-input" id="keyInput" placeholder="貼上金鑰" autocomplete="off">
    <a class="key-link" id="keyHelp" href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">如何申請？</a>
    <p class="key-status" id="keyStatus">尚未檢查</p>

    <label class="field-label" for="modelSel">模型</label>
    <select class="field-input" id="modelSel"></select>

    <div class="modal-row">
      <button class="btn-ghost" type="button" onclick="closeModal()">取消</button>
      <button class="btn-primary btn-primary--compact" type="button" onclick="saveSettings()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<div class="img-lightbox" id="imgLightbox" onclick="closeLightbox(event)" hidden>
  <img class="lightbox-img" id="lightboxImg" src="" alt="題目放大">
</div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="js/database-bundle.js"></script>
<script src="js/db-parse.js"></script>
<script src="js/db-meta.js"></script>
<script src="js/db-rules.js?v=20250626r"></script>
<script src="js/database.js?v=20250626r"></script>
<script src="js/prompts.js?v=20250626w"></script>
<script src="js/plain-reaction-table.js?v=20250626x"></script>
<script src="js/plain-choice-options.js?v=20250626x"></script>
<script src="js/math-note/math-note.js?v=20250626b"></script>
<script src="js/render.js?v=20250626x"></script>
<script src="js/api.js"></script>
<script src="js/app.js?v=20250626x"></script>
</body>
</html>

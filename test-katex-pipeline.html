<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
</head><body>
<div id="t1">$$K_c = \dfrac{[Cu^{2+}]}{[Cu^+]^2} = \dfrac{0.2-x}{(2x)^2} = 2 \times 10^7$$</div>
<div id="t2">$$K_c = \dfrac{[\mathrm{Cu}^{2+}]}{[\mathrm{Cu}^{+}]^{2}} = \dfrac{0.2-x}{(2x)^{2}} = 2 \times 10^{7}$$</div>
<script>
function test(id) {
  const el = document.getElementById(id);
  try {
    renderMathInElement(el, {delimiters:[{left:'$$',right:'$$',display:true}], throwOnError:true});
    el.dataset.result = el.querySelector('.katex') ? 'OK' : 'FAIL';
  } catch(e) {
    el.dataset.result = 'ERR:' + e.message;
  }
}
test('t1'); test('t2');
document.body.insertAdjacentHTML('beforeend','<pre id="out"></pre>');
document.getElementById('out').textContent = 't1:'+document.getElementById('t1').dataset.result+'\nt2:'+document.getElementById('t2').dataset.result;
</script></body></html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 解題</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5; color: #0f172a; min-height: 100vh;
    }
    header {
      background: #1e293b; padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; z-index: 50;
    }
    .logo { color: #fff; font-size: 17px; font-weight: 700; }
    .logo span { color: #60a5fa; }
    .btn-settings {
      background: transparent; border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.85); padding: 7px 14px; border-radius: 8px;
      cursor: pointer; font-size: 13px; font-family: inherit;
    }
    .btn-settings:hover { background: rgba(255,255,255,.1); }
    main {
      max-width: 860px; margin: 0 auto; padding: 24px 16px 48px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 6px 18px rgba(0,0,0,.04);
    }
    .field-label {
      display: block; font-size: 12px; font-weight: 700;
      color: #64748b; letter-spacing: .5px; margin-bottom: 8px;
    }
    .upload-zone {
      border: 2px dashed #cbd5e1; border-radius: 12px; padding: 32px 20px;
      text-align: center; cursor: pointer; position: relative; transition: .2s;
    }
    .upload-zone:hover, .upload-zone.over { border-color: #3b82f6; background: #f0f7ff; }
    .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 32px; color: #94a3b8; margin-bottom: 8px; }
    .upload-hint { color: #64748b; font-size: 14px; }
    .upload-hint strong { color: #3b82f6; }
    .preview-wrap { margin-top: 14px; display: none; }
    .preview-wrap.show { display: block; }
    .preview-img { max-width: 100%; max-height: 220px; border-radius: 10px; border: 1px solid #e2e8f0; display: block; }
    .preview-name { margin-top: 6px; font-size: 12px; color: #94a3b8; }
    .question-input {
      width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 10px;
      font-size: 15px; font-family: inherit; color: #0f172a; margin-top: 16px;
    }
    .question-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .action-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn-primary {
      flex: 1; background: #1e293b; color: #fff; border: none;
      padding: 13px 20px; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-primary:hover:not(:disabled) { background: #334155; }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; }
    .btn-secondary {
      background: transparent; color: #64748b; border: 1px solid #e2e8f0;
      padding: 13px 18px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .result-card { display: none; }
    .result-card.show { display: block; }
    .result-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid #f1f5f9;
    }
    .result-label { font-size: 12px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .8px; }
    .result-badge { font-size: 12px; font-weight: 500; padding: 3px 10px; border-radius: 20px; background: #ecfdf5; color: #059669; }
    .chat-thread { display: flex; flex-direction: column; gap: 14px; max-height: 60vh; overflow-y: auto; }
    .msg { border-radius: 12px; padding: 14px 16px; font-size: 15px; line-height: 1.9; }
    .msg-user { background: #f1f5f9; color: #334155; align-self: flex-end; max-width: 88%; border-bottom-right-radius: 4px; }
    .msg-ai { background: #fafbfc; border: 1px solid #f1f5f9; border-bottom-left-radius: 4px; }
    .msg-role { font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
    .msg-body { font-size: 15px; line-height: 1.62; }
    .msg-body .katex { font-size: 1em; line-height: 1.18; }
    .msg-body .katex-display {
      margin: 4px 0; overflow: visible; font-size: 1.02em;
      white-space: normal;
    }
    .math-block {
      display: block; width: 100%; overflow: visible;
      margin: 3px 0 5px; padding: 1px 0 2px;
      line-height: 1.32; min-height: max-content;
    }
    .math-block .katex {
      display: inline-block; overflow: visible;
      line-height: 1.32; max-width: 100%;
    }
    .msg-body .katex .mfrac { margin-left: .05em; margin-right: .05em; }
    .math-note {
      cursor: pointer; border-radius: 5px;
      padding: .16em .32em; margin: -.16em -.12em;
      display: inline-block; touch-action: manipulation;
      transition: background .15s, color .15s, box-shadow .15s;
    }
    .math-note.active {
      background: #fef3c7; color: #92400e;
      box-shadow: 0 0 0 2px #fbbf24 inset;
    }
    .math-note-popover {
      position: fixed; display: none; z-index: 300;
      max-width: min(280px, calc(100vw - 24px));
      background: #1e293b; color: #fff; border-radius: 10px;
      padding: 9px 12px; font-size: 13px; line-height: 1.55;
      box-shadow: 0 10px 24px rgba(15,23,42,.22);
    }
    .math-note-popover.show { display: block; }
    .answer-box {
      margin-top: 10px; padding: 10px 14px; background: #eff6ff;
      border-left: 3px solid #3b82f6; border-radius: 0 8px 8px 0; font-weight: 700; color: #1d4ed8;
    }
    .key-status { font-size: 12px; color: #64748b; margin: -8px 0 14px; line-height: 1.5; }

    /* ── Annotation badges ── */
    .anno-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin: 4px 0 10px; padding: 0;
    }
    .anno-badge {
      position: relative; display: inline-flex; align-items: center; gap: 4px;
      background: #f1f5f9; border: 1px solid #cbd5e1;
      border-radius: 20px; padding: 3px 11px;
      font-size: 13px; cursor: pointer; user-select: none;
      transition: background .15s, border-color .15s;
    }
    .anno-badge:hover { background: #e2e8f0; border-color: #94a3b8; }
    .anno-badge.active { background: #1e293b; border-color: #1e293b; color: #fff; }
    .anno-badge .anno-term { font-weight: 600; font-family: 'Courier New', monospace; font-size: 12px; }
    .anno-popup {
      display: none; position: absolute; bottom: calc(100% + 8px); left: 50%;
      transform: translateX(-50%);
      background: #1e293b; color: #fff; border-radius: 10px;
      padding: 8px 13px; font-size: 13px; white-space: nowrap;
      z-index: 30; pointer-events: none;
      line-height: 1.5;
    }
    .anno-popup::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 6px solid transparent; border-top-color: #1e293b;
    }
    .anno-badge.active .anno-popup { display: block; }
    .anno-hint { font-size: 11px; color: #94a3b8; margin: -4px 0 8px; }
    .loading-inline { display: none; align-items: center; gap: 10px; padding: 12px 0; color: #94a3b8; font-size: 14px; }
    .loading-inline.show { display: flex; }
    .spinner {
      width: 22px; height: 22px; border: 2px solid #e2e8f0; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .chat-input-wrap { margin-top: 16px; padding-top: 16px; border-top: 1px solid #f1f5f9; display: none; }
    .chat-input-wrap.show { display: block; }
    .chat-input-row { display: flex; gap: 8px; align-items: flex-end; }
    .chat-input {
      flex: 1; padding: 11px 14px; border: 1px solid #e2e8f0; border-radius: 10px;
      font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 120px;
    }
    .btn-send {
      background: #1e293b; color: #fff; border: none; padding: 11px 18px;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-send:disabled { opacity: .45; cursor: not-allowed; }
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.48);
      display: none; align-items: center; justify-content: center; z-index: 100; padding: 16px;
    }
    .overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 16px; padding: 28px; width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .modal-desc { font-size: 13px; color: #64748b; margin-bottom: 18px; line-height: 1.6; }
    .free-tip {
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px;
      padding: 12px 14px; font-size: 13px; color: #166534; margin-bottom: 18px; line-height: 1.6;
    }
    .free-tip a { color: #15803d; font-weight: 600; }
    .field-input {
      width: 100%; padding: 11px 13px; border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 14px; margin-bottom: 14px; font-family: inherit;
    }
    .field-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
    .key-link { font-size: 12px; color: #3b82f6; margin: -8px 0 14px; display: block; }
    .modal-row { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-cancel { padding: 9px 18px; border: 1px solid #e2e8f0; background: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .btn-save { padding: 9px 20px; background: #1e293b; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .toast {
      position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #fff; padding: 11px 22px; border-radius: 10px; font-size: 14px;
      opacity: 0; transition: .3s; z-index: 200;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      main { padding: 16px 12px 40px; }
      .card { padding: 18px; }
      .msg-user { max-width: 95%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">AI <span>解題</span></div>
  <button class="btn-settings" onclick="openModal()">API 設定</button>
</header>

<main>
  <div class="card">
    <div class="upload-zone" id="zone">
      <input type="file" id="fileInput" accept="image/*" onchange="onFile(this.files[0])">
      <div class="upload-icon">📷</div>
      <div class="upload-hint"><strong>點擊上傳</strong>或拖放、貼上圖片</div>
    </div>
    <div class="preview-wrap" id="prevWrap">
      <img class="preview-img" id="prevImg" src="" alt="預覽">
      <div class="preview-name" id="prevName"></div>
    </div>
    <label class="field-label" style="margin-top:16px">指定題目</label>
    <input type="text" class="question-input" id="questionInput" placeholder="例：第4題、第2題組第(1)小題">
    <div class="action-row">
      <button class="btn-primary" id="solveBtn" onclick="startSolve()" disabled>解題</button>
      <button class="btn-secondary" onclick="clearAll()">清除</button>
    </div>
  </div>

  <div class="card result-card" id="resultCard">
    <div class="result-header">
      <div class="result-label">解題過程</div>
      <div class="result-badge" id="badge">就緒</div>
    </div>
    <div class="chat-thread" id="chatThread"></div>
    <div class="loading-inline" id="loading"><div class="spinner"></div><span>AI 思考中⋯</span></div>
    <div class="chat-input-wrap" id="chatInputWrap">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chatInput" rows="1" placeholder="追問⋯" onkeydown="chatKeydown(event)"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendFollowUp()">送出</button>
      </div>
    </div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title">API 設定</div>
    <div class="modal-desc">API Key 僅存於本機瀏覽器，直接呼叫 Google Gemini API。</div>
    <div class="free-tip">
      <strong>數學／化學計算題</strong>固定使用 <strong>Gemini 3.1</strong>。<br>
      請貼上 Gemini API Key 後直接解題。Gemini 金鑰 → <a id="keyLink" href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a>
    </div>

    <label class="field-label">AI 服務</label>
    <select class="field-input" id="providerSel" onchange="onProviderChange()">
      <option value="gemini">Google Gemini（計算較準）</option>
    </select>

    <label class="field-label">API Key</label>
    <input type="password" class="field-input" id="keyInput" placeholder="貼上 Gemini API Key">
    <a class="key-link" id="keyHelp" href="https://aistudio.google.com/apikey" target="_blank">如何取得 Gemini API Key？</a>
    <div class="key-status" id="keyStatus">尚未檢查 Key</div>

    <label class="field-label">模型</label>
    <select class="field-input" id="modelSel"></select>

    <div class="modal-row">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveSettings()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

<script>
const PROVIDERS = {
  gemini: {
    label: 'Google Gemini',
    keyPlaceholder: 'AIza...',
    keyUrl: 'https://aistudio.google.com/apikey',
    models: [
      { id: 'gemini-3.1-flash-lite', name: 'Gemini 3.1 Flash Lite（推薦）' },
      { id: 'gemini-3.1-pro-preview', name: 'Gemini 3.1 Pro（最強推理）' }
    ]
  }
};

const DEPRECATED = {
  'llama-3.2-11b-vision-preview': 'gemini-3.1-flash-lite',
  'llama-3.2-90b-vision-preview': 'gemini-3.1-flash-lite',
  'gemini-1.5-flash': 'gemini-3.1-flash-lite',
  'gemini-1.5-flash-002': 'gemini-3.1-flash-lite',
  'gemini-2.0-flash': 'gemini-3.1-flash-lite',
  'gemini-2.0-flash-lite': 'gemini-3.1-flash-lite',
  'gemini-2.5-flash': 'gemini-3.1-flash-lite',
  'gemini-2.5-flash-lite': 'gemini-3.1-flash-lite',
  'gemini-2.5-pro': 'gemini-3.1-pro-preview',
  'gemini-3-flash-preview': 'gemini-3.1-flash-lite'
};

function cleanKey(value) {
  return String(value || '').replace(/[\s\u200B-\u200D\uFEFF]/g, '');
}
function loadSetting(name, fallback = '') {
  return localStorage.getItem(name) || sessionStorage.getItem(name) || fallback;
}
function keySummary(key) {
  const k = cleanKey(key);
  if (!k) return '目前未儲存 API Key';
  return `已儲存 Key：${k.slice(0, 6)}...${k.slice(-4)}（長度 ${k.length}）`;
}

let imgDataURL = null, apiMessages = [], busy = false;
const savedModel = loadSetting('aim', 'gemini-3.1-flash-lite');
const cfg = {
  provider: 'gemini',
  key:      cleanKey(loadSetting('aik', '')),
  model:    DEPRECATED[savedModel] || savedModel || 'gemini-3.1-flash-lite'
};
localStorage.setItem('aip', 'gemini');
sessionStorage.setItem('aip', 'gemini');
if (cfg.model !== savedModel) localStorage.setItem('aim', cfg.model);

const SYSTEM = `你是台灣高中理化教師。請完全模仿以下「板書詳解風格」撰寫，適用於所有理化題型。

【鐵律】
1. 嚴禁開場白、客套話、題幹重述、結論總結。第一行就直接寫公式或前提。
2. 以「公式代入」為主，中文說明每句 ≤ 15 字，能列式就不寫句子。
3. 所有分數一律用 $\\dfrac{}{}$（禁用 \\frac），巢狀分數也要完整展開。
4. 同一邏輯鏈盡量同一行，用 $;$ 或 $\\Rightarrow$ 串接；禁止連續空白行。
5. 每個數學式中的所有數字都必須能點擊顯示中文解說：用 $\\htmlData{note=繁體中文短註解}{數學內容}$ 包住每個數字、小分式、化學式或小段代入式。註解必須繁體中文、≤14字、不可有空格或英文。
6. 使用層級註解：內層標單一數字來源，外層標整段意義。例：$\\htmlData{note=溶質莫耳數}{\\htmlData{note=溶液濃度}{3.0\\times10^{-3}}\\times\\htmlData{note=溶液體積}{10.0}\\times\\htmlData{note=毫升轉公升}{10^{-3}}}$。
7. 每一個數字、指數、係數、時間、體積、壓力、濃度、莫耳數、比例值都要標註；若同一數字重複出現，仍需各自標註其當下意義。
8. 體積由 mL 轉 L 時，優先寫成 $\\htmlData{note=溶液體積}{10.0}\\times\\htmlData{note=毫升轉公升}{10^{-3}}$，不要寫成 $\\dfrac{10.0}{1000}$。
9. 加註解前必須先在心中完成「變數對應檢查」：先判斷每個數字代入哪個物理/化學量，再寫 $\\htmlData$；不確定時用「代入題給數值」，不可亂寫。
10. 速率定律或動力學式特別注意位置意義：若 $\\dfrac{1}{P_t}-\\dfrac{1}{P_0}=kt$，則分母 $P_t$ 是後來分壓、$P_0$ 是初始分壓、$t$ 是時間；例 $\\dfrac{1}{\\htmlData{note=後來分壓}{99}}-\\dfrac{1}{\\htmlData{note=初始分壓}{101}}=k\\times\\htmlData{note=反應時間}{16}$。
11. 不要整條公式包成一個註解；不要標分式橫線或等號；應標在學生會想問「這個數字哪來」的位置。

【板書骨架（依題目取用，不必全寫）】

■ 前提行（氣體／溶液／壓力題常用）：
定溫定容，$C_M=\\dfrac{n}{V}$，$C_M\\propto n$，以各成分莫耳數代替濃度計算。
定溫定壓，$PV=nRT$，$V\\propto n$，以氣體總莫耳數作為體積計算。

■ 反應變化表（涉及莫耳數／分壓／濃度變化時必寫）：
不可用空白手動對齊；一律用 LaTeX array，使物種、初始、變化、結果欄位垂直對齊；array 必須用 $$...$$ 獨立包住：
$$\\begin{array}{c|ccc}
 & \\htmlData{note=反應係數}{2}NO_2 & \\htmlData{note=反應係數}{2}NO & O_2\\\\
\\text{初始} & P_0 & \\htmlData{note=初始莫耳數}{0} & \\htmlData{note=初始莫耳數}{0}\\\\
\\text{變化} & -\\htmlData{note=反應係數}{2}x & +\\htmlData{note=反應係數}{2}x & +x\\\\
\\text{結果} & P_0-\\htmlData{note=消耗量}{2x} & \\htmlData{note=生成量}{2x} & x
\\end{array}$$

■ 選擇題先分類，再決定篇幅：
・計算型選擇題：若五個選項只是同一數值的不同答案，不要逐項解釋。只列完整計算式，最後寫「故選 (X)」或「故 (X) 正確」。
・多小題計算題：每小題各自列式，分別指出正確選項，不列錯誤選項。
・概念型選擇題：若各選項考不同觀念、不同條件或不同判斷鏈，才逐項寫 (A)～(E)。
・混合型多選題：若每個選項都需獨立判斷，逐項列式或短句，行末標 (對)/(錯)。

■ 計算題分步 (1)(2)(3)，每步 2~3 行，直接列式；計算完只標正確選項。

【題型手法（依題目選用 1~2 種，勿堆砌）】

・速率比：設初速 $r=a$。若各選項為不同條件，逐項寫 $\\dfrac{r}{a}=\\dfrac{[新速率式]}{[舊速率式]}=$ 數值，$r=$ 結果 $a$；若只是問單一數值選項，只算一次並指出選項。
・惰性氣體：定容→各成分 mol 不變則濃度不變；定壓→濃度 $=\\dfrac{自身\\,mol}{總\\,mol}$，體積隨總 mol 膨脹。
・氣體 $\\Delta n$：$\\Delta n=$ 產物氣體係數和 $-$ 反應物氣體係數和；$\\Delta n=0$ 則總壓不變，無法測速率。
・速率級數：假設 $r=k[A]^x[B]^y[C]^z$，固定其餘變數比較兩組實驗：$\\dfrac{R_1}{R_2}=\\dfrac{[A]_1^x[B]_1^y}{[A]_2^x[B]_2^y}\\Rightarrow$ 求 $x,y,z$。
・濃度變化比：$\\Delta[A]:\\Delta[B]:\\Delta[C]=$ 數值比，化簡得係數比。
・平均速率法：$\\dfrac{\\Delta P}{\\Delta t}=k\\times\\dfrac{P_{初}+P_{末}}{2}$ 或濃度版。
・反應級數判斷：等比遞減→一級；半衰期逐次加倍→二級。
・分壓／濃度表：列 $t$、總壓、各成分分壓，再代入速率式。

【格式範例（速率＋惰性氣體多選）】
定溫定容，$C_M=\\dfrac{n}{V}$，$C_M\\propto n$，以各成分莫耳數代替濃度計算。
定溫定壓，$PV=nRT$，$V\\propto n$，以氣體總莫耳數作為體積計算。
初速 $a=k\\cdot\\dfrac{4}{V}\\cdot\\dfrac{1}{V}$。
(A) 定溫定容加 Ne：$\\dfrac{r}{a}=\\dfrac{4\\times1}{4\\times1}=1$，$r=a$ (對)
(B) 定溫定壓加 Ne：$\\dfrac{r}{a}=\\dfrac{\\dfrac{4}{10}\\times\\dfrac{1}{10}}{\\dfrac{4}{5}\\times\\dfrac{1}{5}}=0.25$，$r=0.25a$ (錯)
(C) 定溫定容加 $N_2$：$\\dfrac{r}{a}=\\dfrac{(4+5)\\times1}{4\\times1}=\\dfrac{9}{4}$，$r=\\dfrac{9}{4}a$ (對)
**答：(A)(C)**

【格式範例（計算型單選／多小題）】
(1) $n(NaHSO_3)=2\\times n(Na_2S_2O_5)=2\\times\\htmlData{note=硫代硫酸鈉莫耳數}{0.003}=\\htmlData{note=產生亞硫酸氫鈉莫耳數}{6.0\\times10^{-3}}\\;mol$
故 (D) 正確。

(2) 混合後 $V=10.0+10.0=20.0\\;mL=0.020\\;L$
$[HSO_3^-]=\\dfrac{\\htmlData{note=溶質莫耳數}{\\htmlData{note=溶液A濃度}{6.0\\times10^{-3}}\\times\\htmlData{note=溶液體積}{10.0}\\times\\htmlData{note=毫升轉公升}{10^{-3}}}}{\\htmlData{note=混合後總體積}{0.020}}=\\htmlData{note=混合後濃度}{3.0\\times10^{-3}}\\;M$
$r=\\dfrac{\\Delta[HSO_3^-]}{\\Delta t}=\\dfrac{\\htmlData{note=消耗濃度}{3.0\\times10^{-3}}}{\\htmlData{note=反應時間}{5}}=\\htmlData{note=平均消失速率}{6.0\\times10^{-4}}\\;M\\,s^{-1}$
故 (D) 正確。
**答：(1)(D)；(2)(D)**

【結尾】單獨一行「**答：(選項或數值)**」，不加其他文字。

【追問】2~3 行算式，不重述題目。`;

const zone = document.getElementById('zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('over'); });
zone.addEventListener('dragleave', () => zone.classList.remove('over'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f?.type.startsWith('image/')) onFile(f);
});
document.addEventListener('paste', e => {
  const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
  if (item) onFile(item.getAsFile());

function onFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgDataURL = e.target.result;
    document.getElementById('prevImg').src = imgDataURL;
    document.getElementById('prevName').textContent = file.name || '貼上的圖片';
    document.getElementById('prevWrap').classList.add('show');
    document.getElementById('solveBtn').disabled = false;
    apiMessages = [];
    document.getElementById('chatThread').innerHTML = '';
    document.getElementById('chatInputWrap').classList.remove('show');
  };
  reader.readAsDataURL(file);
}

  document.getElementById('questionInput').value = '';
  document.getElementById('chatInput').value = '';

/* ── API adapters ── */
function parseDataURL(url) {
  const [h, data] = url.split(',');
  return { mime: h.match(/data:([^;]+)/)[1], data };
}

async function callGemini() {
  const apiKey = cleanKey(cfg.key);
  cfg.key = apiKey;
  const contents = apiMessages.map(msg => {
    const role = msg.role === 'assistant' ? 'model' : 'user';
    const parts = [];
    if (Array.isArray(msg.content)) {
      for (const p of msg.content) {
        if (p.type === 'image_url') {
          const { mime, data } = parseDataURL(p.image_url.url);
          parts.push({ inline_data: { mime_type: mime, data } });
        } else parts.push({ text: p.text });
      }
    } else parts.push({ text: msg.content });
    return { role, parts };
  });

  const payload = {
    model: cfg.model,
    system_instruction: { parts: [{ text: SYSTEM }] },
    contents,
    generationConfig: { maxOutputTokens: 4000, temperature: 0.1 }
  };
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${cfg.model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      mode: 'cors',
      redirect: 'follow',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch (err) {
    throw err;
  }
  const raw = await res.text();
  let data;
  try {
    data = JSON.parse(raw);
  } catch {
    throw new Error(raw || `HTTP ${res.status}`);
  }
  if (data.error) {
    const detail = data.error.message || JSON.stringify(data.error);
    throw new Error(detail);
  }
  if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);
  const candidate = data.candidates?.[0];
  const parts = candidate?.content?.parts || [];
  const text = parts.map(p => p.text || '').join('').trim();
  if (text) return text;
  const reason = candidate?.finishReason || data.promptFeedback?.blockReason || '未知原因';
  throw new Error(`Gemini 沒有回傳文字。原因：${reason}`);
}

function formatError(msg) {
  if (/Gemini 沒有回傳文字/i.test(msg)) {
    return `${msg}\n\n請維持 Gemini 3.1，並檢查圖片清晰度或 Gemini 回傳限制。`;
  }
  if (/Failed to fetch|Load failed|NetworkError/i.test(msg)) {
    return '無法直接連到 Google Gemini API。\n\n請確認目前網路可連線，並重新整理後再試。';
  }
  if (/invalid authentication credentials|expected oauth|login cookie|authentication credential|api key not valid|API_KEY_INVALID|PERMISSION_DENIED|forbidden|unauthorized/i.test(msg)) {
    return 'API Key 驗證失敗。\n\n請到「API 設定」重新貼上 Gemini API Key 後儲存。';
  }
  if (/high demand|spikes in demand|try again later/i.test(msg)) {
    return 'Gemini 3.1 目前請求過多，請稍後再試。';
  }
  if (/not found|not supported for generateContent/i.test(msg)) {
    return '此 Gemini 3.1 模型目前不可用。請確認 Google AI Studio 是否支援此模型 ID。';
  }
  if (/decommissioned|model_decommissioned/i.test(msg)) {
    return '此 Gemini 3.1 模型已被官方下架或更名。請確認 Google AI Studio 最新 Gemini 3.1 模型 ID。';
  }
  if (/quota|rate.?limit|exceeded|limit:\s*0/i.test(msg)) {
    return 'Gemini 3.1 額度已用完，請更換另一把 Gemini API Key 或等待額度恢復。';
  }
  return msg;
}

async function callAPI() {
  return callGemini();
}

async function startSolve() {
  if (!cfg.key) { openModal(); toast('請先設定 Gemini API Key'); return; }
  if (!imgDataURL || busy) return;
  const q = document.getElementById('questionInput').value.trim();
  if (!q) { toast('請輸入要解的題目'); return; }

  document.getElementById('resultCard').classList.add('show');
  document.getElementById('chatInputWrap').classList.add('show');
  appendMsg('user', q);
  setBusy(true);
  setBadge('解題中…', '#fef9c3', '#92400e');

  // 引導 AI 直接切入主題，不再贅述題幹
  const userText = `請針對圖片中的【${q}】撰寫板書詳解。
要求：
1. 嚴格模仿系統提示詞的板書風格（前提行→列式代入→指出正確）。
2. 所有分數用 $\\dfrac{}{}$，數值代入過程完整展開，巢狀分數也要寫出。
3. 計算型選擇題只列計算過程並指出正確選項；不要逐一列錯誤選項。
4. 概念型、混合型或各選項需獨立判斷時，才逐條列出 (A)(B)(C)(D)(E)。
5. 每個數學式中的所有數字都要有可點擊註解：用 $\\htmlData{note=繁體中文短註解}{數學內容}$ 標在每個數字、化學式、係數、指數或小段代入式上。
6. 使用層級註解：內層標單一數字來源，外層標整段意義。例如整個分子可標「溶質莫耳數」，其中的 10.0 標「溶液體積」、$10^{-3}$ 標「毫升轉公升」。
7. 體積由 mL 轉 L 時，優先寫成 $10.0\\times10^{-3}$，不要寫成 $\\dfrac{10.0}{1000}$。
8. 輸出前先在心中完成變數對應檢查：每個數字要先對應到初始值、後來值、時間、體積、濃度、壓力或係數，再加註解；不確定時寫「代入題給數值」，不可亂寫。
9. 速率式位置要判斷正確：$P_t$ 是後來分壓，$P_0$ 是初始分壓，$t$ 是時間。
10. 反應三段式不可用空白對齊；一律用 LaTeX array，讓反應式、初始、變化、結果垂直對齊。
11. array 必須用 $$...$$ 獨立包住，禁止輸出成普通文字；array 裡的每個數字、係數、x 也要加 $\\htmlData{note=...}{...}$ 註解。
12. 不要把整條公式包成一個註解，不要標等號或分式橫線。
13. 遇到大型分式或巢狀分式時，拆成較短的兩行；一般短分式維持同一段，不要過度分行。
14. 分段要清楚但緊湊，禁止連續空白行，禁止大段留白。
15. 禁止重述題幹，禁止廢話，直接開始寫。`;
  apiMessages = [{
    role: 'user',
    content: [
      { type: 'image_url', image_url: { url: imgDataURL, detail: 'high' } },
      { type: 'text', text: userText }
    ]
  }];

  try {
    const reply = await callAPI();
    apiMessages.push({ role: 'assistant', content: reply });
    appendMsg('ai', reply);
    setBadge('完成', '#ecfdf5', '#059669');
  } catch (err) {
    appendMsg('ai', `❌ ${formatError(err.message)}`);
    setBadge('錯誤', '#fef2f2', '#dc2626');
  } finally { setBusy(false); }
}

async function sendFollowUp() {
  if (!cfg.key || busy) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !apiMessages.length) return;
  input.value = '';
  appendMsg('user', text);
  setBusy(true);
  setBadge('回覆中…', '#fef9c3', '#92400e');
  apiMessages.push({ role: 'user', content: text });
  try {
    const reply = await callAPI();
    apiMessages.push({ role: 'assistant', content: reply });
    appendMsg('ai', reply);
    setBadge('完成', '#ecfdf5', '#059669');
  } catch (err) {
    apiMessages.pop();
    appendMsg('ai', `❌ ${formatError(err.message)}`);
    setBadge('錯誤', '#fef2f2', '#dc2626');
  } finally { setBusy(false); }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Annotation badge rendering ── */
let annoCounter = 0;
function renderAnnoRow(pairsStr) {
  const pairs = pairsStr.split(',').map(p => p.trim()).filter(Boolean);
  const id = 'anno-' + (annoCounter++);
  const badges = pairs.map((pair, i) => {
    const arrow = pair.indexOf('→');
    if (arrow === -1) return '';
    const term = pair.slice(0, arrow).trim();
    const meaning = pair.slice(arrow + 1).trim();
    const bid = `${id}-${i}`;
    return `<span class="anno-badge" id="${bid}" onclick="toggleAnno('${bid}')">
      <span class="anno-term">${esc(term)}</span>
      <span class="anno-popup">${esc(meaning)}</span>
    </span>`;
  }).join('');
  return `<div class="anno-row">${badges}</div>`;
}

function toggleAnno(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const wasActive = el.classList.contains('active');
  // close all in same row
  el.closest('.anno-row')?.querySelectorAll('.anno-badge').forEach(b => b.classList.remove('active'));
  if (!wasActive) el.classList.add('active');
}

function render(raw) {
  // Step 1: protect math formulas FIRST.
  // Crucially, escape < > INSIDE the formula string so it's safe to insert into innerHTML.
  // The browser decodes &lt;/&gt; back to </>  in text nodes, so KaTeX still processes them correctly.
  const math = [];
  const mathPattern = /(\$\$[\s\S]+?\$\$|\$\\begin\{(?:array|aligned|matrix|pmatrix|bmatrix)\}[\s\S]+?\\end\{(?:array|aligned|matrix|pmatrix|bmatrix)\}\$|\$[^$\n]+?\$)([。；，、,.])?/g;
  let   s = raw.replace(mathPattern, (m, formula, punct = '') => {
    const mText = formula;
    const enhanced = enhanceMath(mText);
    const safeMath = enhanced.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const isInline = enhanced.startsWith('$') && !enhanced.startsWith('$$');
    const fracCount = (enhanced.match(/\\dfrac|\\over/g) || []).length;
    const needsBlock = isInline && (
      /\\begin\{array\}|\\begin\{aligned\}/.test(enhanced) ||
      fracCount >= 2 ||
      (fracCount >= 1 && enhanced.length > 95)
    );
    math.push(needsBlock ? `<div class="math-block">${safeMath}${punct}</div>` : `${safeMath}${punct}`);
    return `\x00M${math.length-1}\x00`;
  });

  // Step 2: protect @注 annotation rows
  const annos = [];
  let hasAnno = false;
  s = s.replace(/^@注\[(.+)\][ \t]*$/gm, (_, inner) => {
    annos.push(renderAnnoRow(inner));
    hasAnno = true;
    return `\x00A${annos.length-1}\x00`;
  });

  // Step 3: escape all remaining (non-math) text — prevents < > in plain text from corrupting HTML
  s = esc(s);

  // Step 4: markdown bold → <strong>
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Step 5: answer box
  s = s.replace(/(<strong>答[：:].*?<\/strong>)/g, '<div class="answer-box">$1</div>');

  // Step 6: newlines
  s = s.replace(/\n/g, '<br>');

  // Step 7: restore math (< > are &lt;/&gt; in HTML but decoded to raw chars in DOM text nodes for KaTeX)
  math.forEach((m, i) => { s = s.replace(`\x00M${i}\x00`, m); });

  // Step 8: restore annotation HTML
  annos.forEach((html, i) => { s = s.replace(`\x00A${i}\x00`, html); });

  if (hasAnno) s = '<div class="anno-hint">點擊標籤查看意義</div>' + s;

  return s;
}

function enhanceMath(tex) {
  return tex
    .replace(/\\frac\b/g, '\\dfrac')
    .replace(/\\tfrac\b/g, '\\dfrac');
}

function ensureMathNotePopover() {
  let pop = document.getElementById('mathNotePopover');
  if (!pop) {
    pop = document.createElement('div');
    pop.id = 'mathNotePopover';
    pop.className = 'math-note-popover';
    document.body.appendChild(pop);
  }
  return pop;
}

function hideMathNote() {
  document.querySelectorAll('.math-note.active').forEach(el => el.classList.remove('active'));
  ensureMathNotePopover().classList.remove('show');
}

function showMathNote(el) {
  const pop = ensureMathNotePopover();
  const note = el.dataset.note;
  if (!note) return;
  document.querySelectorAll('.math-note.active').forEach(item => {
    if (item !== el) item.classList.remove('active');
  });
  el.classList.add('active');
  pop.textContent = note;
  pop.classList.add('show');

  const rect = el.getBoundingClientRect();
  const popRect = pop.getBoundingClientRect();
  let left = rect.left + rect.width / 2 - popRect.width / 2;
  left = Math.max(12, Math.min(left, window.innerWidth - popRect.width - 12));
  let top = rect.top - popRect.height - 10;
  if (top < 12) top = rect.bottom + 10;
  pop.style.left = `${left}px`;
  pop.style.top = `${top}px`;
}

function initMathNotes(root) {
  root.querySelectorAll('[data-note]').forEach(el => {
    el.classList.add('math-note');
    el.addEventListener('click', e => {
      e.stopPropagation();
      const wasActive = el.classList.contains('active');
      hideMathNote();
      if (!wasActive) showMathNote(el);
    });
    el.addEventListener('dblclick', e => {
      e.preventDefault();
      e.stopPropagation();
      const parentNote = el.parentElement?.closest('[data-note]');
      hideMathNote();
      showMathNote(parentNote || el);
    });
  });
}

function doKaTeX(el) {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(el, {
      delimiters: [{ left: '$$', right: '$$', display: true }, { left: '$', right: '$', display: false }],
      throwOnError: false,
      trust: context => context.command === '\\htmlData',
      macros: { '\\frac': '\\dfrac', '\\tfrac': '\\dfrac' }
    });
    initMathNotes(el);
  }
}

// close annotation popups when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.anno-badge')) {
    document.querySelectorAll('.anno-badge.active').forEach(b => b.classList.remove('active'));
  }
  if (!e.target.closest('.math-note') && !e.target.closest('.math-note-popover')) {
    hideMathNote();
  }
});

onProviderChange();
if (!cfg.key) setTimeout(openModal, 400);
</script>

<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>化學計量工作台</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/app.css?v=20260713i"><link rel="stylesheet" href="css/tool.css?v=20260713a"></head>
<body class="app-page"><header class="site-header"><div class="brand"><span class="brand-mark" aria-hidden="true"></span><div class="brand-text"><span class="brand-name">化學計量工作台</span><span class="brand-sub">反應式、莫耳比與單位檢查</span></div></div><nav class="header-nav"><a class="nav-btn" href="solution-format.html">排版</a><a class="nav-btn" href="evaluation-lab.html">測試台</a></nav></header>
<main class="page-main tool-main"><div class="tool-grid"><section class="tool-panel"><h1 class="tool-title">反應式檢查</h1><p class="tool-desc">支援常見化學式的元素守恆檢查；複雜配位化合物、離子電荷與有機結構仍須人工確認。</p><label class="tool-label" for="reaction">反應式</label><input class="tool-input" id="reaction" placeholder="例：2H2 + O2 → 2H2O"><div class="tool-actions"><button class="btn-primary" id="checkReaction" type="button">檢查元素守恆</button></div><p class="tool-status" id="reactionStatus"></p><div class="tool-table-wrap"><table class="tool-table" id="atomTable" hidden><thead><tr><th>元素</th><th>反應物</th><th>生成物</th></tr></thead><tbody></tbody></table></div></section><section class="tool-panel"><h2 class="tool-title">限量試劑</h2><p class="tool-desc">填入已換算的莫耳數。程式比較 <code>n/係數</code>，最低者為限量試劑。</p><div class="tool-table-wrap"><table class="tool-table"><thead><tr><th>物質</th><th>角色</th><th>係數</th><th>莫耳數</th></tr></thead><tbody id="stoichRows"></tbody></table></div><div class="tool-actions"><button class="btn-ghost" id="addStoich" type="button">新增列</button><button class="btn-primary" id="checkStoich" type="button">檢查 n/係數</button></div><p class="tool-status" id="stoichStatus"></p></section><section class="tool-panel tool-panel--wide"><h2 class="tool-title">計量表操作提醒</h2><div class="tool-list"><div class="tool-row"><div class="tool-row-main"><div class="tool-row-title">先配平，再換算</div><div class="tool-row-meta">質量、體積、濃度先轉成可比較的莫耳數，才能套莫耳比。</div></div></div><div class="tool-row"><div class="tool-row-main"><div class="tool-row-title">單位不可省略</div><div class="tool-row-meta">輸出詳解前仍需經過排版工具；程式只檢查結構化數值，不能推測題目單位。</div></div></div></div></section></div></main>
<script src="js/knowledge-store.js?v=20260713a"></script><script src="js/knowledge-tools.js?v=20260713a"></script><script>
(function(){const $=id=>document.getElementById(id),reactionStatus=$('reactionStatus'),table=$('atomTable');function addRow(name='',role='reactant',coefficient='',amount=''){const tr=document.createElement('tr');tr.innerHTML='<td><input class="tool-input" aria-label="物質"></td><td><select class="tool-select" aria-label="角色"><option value="reactant">反應物</option><option value="product">生成物</option></select></td><td><input class="tool-input" type="number" min="0" step="any" aria-label="係數"></td><td><input class="tool-input" type="number" min="0" step="any" aria-label="莫耳數"></td>';const cells=tr.querySelectorAll('input,select');cells[0].value=name;cells[1].value=role;cells[2].value=coefficient;cells[3].value=amount;$('stoichRows').append(tr);} addRow('A','reactant',1,'');addRow('B','reactant',1,'');addRow('產物','product',1,'');$('addStoich').onclick=()=>addRow();$('checkReaction').onclick=()=>{const result=KnowledgeTools.checkReaction($('reaction').value);if(result.error){reactionStatus.textContent=result.error;reactionStatus.className='tool-status tool-status--bad';table.hidden=true;return;}const body=table.querySelector('tbody');body.replaceChildren();Object.keys({...result.left,...result.right}).sort().forEach(el=>{const tr=document.createElement('tr');[el,result.left[el]||0,result.right[el]||0].forEach(v=>{const td=document.createElement('td');td.textContent=v;tr.append(td);});body.append(tr);});table.hidden=false;reactionStatus.textContent=result.ok?'通過：元素數量守恆。':`不守恆：${result.difference.join('；')}`;reactionStatus.className=`tool-status ${result.ok?'tool-status--ok':'tool-status--bad'}`;};$('checkStoich').onclick=()=>{const rows=[...$('stoichRows').querySelectorAll('tr')].map(tr=>{const x=tr.querySelectorAll('input,select');return{name:x[0].value,role:x[1].value,coefficient:x[2].value,amount:x[3].value};});const result=KnowledgeTools.stoich(rows);if(result.issues.length){$('stoichStatus').textContent=`請檢查：${result.issues.join('、')}`;$('stoichStatus').className='tool-status tool-status--bad';return;}if(!result.limiting){$('stoichStatus').textContent='至少需要一列反應物。';$('stoichStatus').className='tool-status tool-status--bad';return;}$('stoichStatus').textContent=`限量試劑：${result.limiting.name}（n/係數 = ${result.limiting.ratio}）。`;$('stoichStatus').className='tool-status tool-status--ok';};})();
</script></body></html>
